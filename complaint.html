<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint — Quality Assurance System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-root"></div>

  <div class="main-col">
    <div id="topbar-root"></div>

    <main class="content" id="content-root">
      <div class="page-head">
        <div>
          <h1>Complaint</h1>
          <p>Catat dan pantau keluhan produk dari pelanggan / konsumen.</p>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary" id="exportExcelBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export Excel
          </button>
          <button class="btn btn-primary" id="newComplaintBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Complaint Baru
          </button>
        </div>
      </div>

      <div class="card card-pad" style="margin-bottom:16px;">
        <div class="filters-bar">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="searchInput" placeholder="Cari no. complaint / produk / pelapor / deskripsi...">
          </div>
          <select id="filterStatus">
            <option value="">Semua Status</option>
            <option>Open</option>
            <option>In Progress</option>
            <option>Closed</option>
            <option>Rejected</option>
          </select>
          <select id="filterSeverity">
            <option value="">Semua Severity</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Critical</option>
          </select>
          <select id="filterSumber">
            <option value="">Semua Sumber</option>
            <option>Email</option>
            <option>Telepon</option>
            <option>WhatsApp</option>
            <option>Lainnya</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="data-table" id="complaintTable">
            <thead>
              <tr>
                <th>No. Complaint</th><th>Tanggal</th><th>Produk</th><th>Pelapor</th><th>Sumber</th>
                <th>Kategori</th><th>Severity</th><th>Status</th><th>Foto</th><th></th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="10" class="page-loader"><span class="spinner"></span>Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="modals-root">
<!-- MODAL: FORM COMPLAINT -->
<div class="modal-backdrop" id="formModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="formModalTitle">Complaint Baru</h3>
      <button class="modal-close" onclick="closeModal('formModal')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="complaintForm">
        <input type="hidden" id="complaintId">
        <div class="form-grid">
          <div class="field">
            <label>Tanggal Complaint <span class="req">*</span></label>
            <input type="date" id="fTanggal" required>
          </div>
          <div class="field">
            <label>Sumber Complaint <span class="req">*</span></label>
            <select id="fSumber" required>
              <option value="">-- Pilih Sumber --</option>
              <option>Email</option>
              <option>Telepon</option>
              <option>WhatsApp</option>
              <option>Lainnya</option>
            </select>
          </div>

          <div class="field full" style="margin-top:4px;">
            <label style="font-weight:700; color:#0f766e;">Informasi Produk</label>
          </div>
          <div class="field">
            <label>Nama Produk <span class="req">*</span></label>
            <input type="text" id="fProdukNama" placeholder="Cth: Nugget Ayam 500gr" required>
          </div>
          <div class="field">
            <label>Kode Batch</label>
            <input type="text" id="fKodeBatch" placeholder="Cth: B240712A">
          </div>
          <div class="field">
            <label>Tanggal Produksi</label>
            <input type="date" id="fTglProduksi">
          </div>
          <div class="field">
            <label>Tanggal Kadaluarsa</label>
            <input type="date" id="fTglKadaluarsa">
          </div>

          <div class="field full" style="margin-top:4px;">
            <label style="font-weight:700; color:#0f766e;">Informasi Pelapor (Pelanggan / Konsumen)</label>
          </div>
          <div class="field">
            <label>Nama Pelapor <span class="req">*</span></label>
            <input type="text" id="fPelaporNama" placeholder="Nama pelanggan / konsumen" required>
          </div>
          <div class="field">
            <label>Kontak Pelapor</label>
            <input type="text" id="fPelaporKontak" placeholder="No. HP / Email pelapor">
          </div>
          <div class="field full">
            <label>Asal Pelapor</label>
            <input type="text" id="fPelaporAsal" placeholder="Cth: Toko Sinar Jaya, Jakarta / PT Mitra Pangan">
          </div>

          <div class="field">
            <label>Kategori</label>
            <select id="fKategori">
              <option value="">-- Pilih Kategori --</option>
              <option>Foreign Material</option>
              <option>Kemasan / Packaging</option>
              <option>Proses Produksi</option>
              <option>Rasa / Taste</option>
              <option>Berat / Weight</option>
              <option>Higienitas</option>
              <option>Lainnya</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="fStatus">
              <option>Open</option>
              <option>In Progress</option>
              <option>Closed</option>
              <option>Rejected</option>
            </select>
          </div>
          <div class="field full">
            <label>Tingkat Keparahan (Severity) <span class="req">*</span></label>
            <div class="radio-row" id="severityChips">
              <label class="radio-chip" data-val="Low"><input type="radio" name="severity" value="Low">Low</label>
              <label class="radio-chip" data-val="Medium"><input type="radio" name="severity" value="Medium" checked>Medium</label>
              <label class="radio-chip" data-val="High"><input type="radio" name="severity" value="High">High</label>
              <label class="radio-chip" data-val="Critical"><input type="radio" name="severity" value="Critical">Critical</label>
            </div>
          </div>
          <div class="field full">
            <label>Deskripsi Keluhan <span class="req">*</span></label>
            <textarea id="fDeskripsi" placeholder="Jelaskan detail keluhan / temuan..." required></textarea>
          </div>
          <div class="field full">
            <label>Tindakan Perbaikan</label>
            <textarea id="fTindakan" placeholder="Tindakan korektif yang sudah / akan dilakukan..."></textarea>
          </div>
          <div class="field full">
            <label>Foto Bukti</label>
            <div class="photo-drop" id="photoDrop">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
              <div>Klik untuk unggah foto (JPG/PNG, maks 5MB)</div>
            </div>
            <input type="file" id="photoInput" accept="image/*" class="hidden">
            <div class="photo-preview-wrap" id="photoPreviewWrap"></div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('formModal')">Batal</button>
      <button class="btn btn-primary" id="saveComplaintBtn">Simpan Complaint</button>
    </div>
  </div>
</div>

<!-- MODAL: DETAIL -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Detail Complaint</h3>
      <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot">
      <button class="btn btn-danger" id="deleteComplaintBtn">Hapus</button>
      <button class="btn btn-secondary" onclick="closeModal('detailModal')">Tutup</button>
      <button class="btn btn-primary" id="editComplaintBtn">Edit</button>
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/layout.js"></script>
<script src="js/router.js"></script>
</body>
</html>
